# DownloadCount in repo.json is normally bumped by the release workflow once per
# tagged release. This workflow refreshes it every 6 hours so the number stays current
# between releases, and can also be triggered manually from the Actions tab.

name: Update Download Count

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch download count from GitHub API
        id: count
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=$(gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '[.[].assets[].download_count] | add // 0')
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Total downloads across all releases: $total"

      - name: Update repo.json
        run: |
          jq --argjson c ${{ steps.count.outputs.total }} \
             '(.[0].DownloadCount) = $c' repo.json > repo.json.tmp
          mv repo.json.tmp repo.json

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add repo.json
          if ! git diff --cached --quiet; then
            git commit -m "Update DownloadCount to ${{ steps.count.outputs.total }}"
            git push origin HEAD:master
          else
            echo "No change in download count."
          fi
