name: Feature request
description: Suggest an idea or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. If the idea isn't fully baked yet, kick it around in [Discussions](https://github.com/XeldarAlz/FFXIV-Aetherphone/discussions) first; fuzzy ideas tend to converge faster there than as tracked issues.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The situation or friction that made you want this. Skip the solution; just the problem.
      placeholder: "I want to pin a conversation to the top of Messages so I don't lose it..."
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What did you have in mind?
      description: Rough sketch is fine. Bullet points, mockups, or just prose.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Other ways to solve the same problem, and why they're worse.

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
